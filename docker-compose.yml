services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: durableflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./deployments/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./deployments/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deployments/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      SERVICE_NAME: durableflow-api
      API_HTTP_ADDR: ${API_HTTP_ADDR:-:8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/durableflow?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_STREAM: ${REDIS_STREAM:-durableflow.tasks}
      REDIS_GROUP: ${REDIS_GROUP:-durableflow-workers}
      REDIS_RECLAIM_MIN_IDLE: ${REDIS_RECLAIM_MIN_IDLE:-30s}
      REDIS_RECLAIM_COUNT: ${REDIS_RECLAIM_COUNT:-10}
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-2s}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    depends_on:
      - postgres
      - redis
      - otel-collector
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      SERVICE_NAME: durableflow-worker
      WORKER_HTTP_ADDR: ${WORKER_HTTP_ADDR:-:8081}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/durableflow?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_STREAM: ${REDIS_STREAM:-durableflow.tasks}
      REDIS_GROUP: ${REDIS_GROUP:-durableflow-workers}
      REDIS_RECLAIM_MIN_IDLE: ${REDIS_RECLAIM_MIN_IDLE:-30s}
      REDIS_RECLAIM_COUNT: ${REDIS_RECLAIM_COUNT:-10}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
    depends_on:
      - postgres
      - redis
      - otel-collector
    ports:
      - "8081:8081"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres-data:
  grafana-data:
